name: Docs
on: [pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Regenerar documentación auto-generada
        run: pnpm docs:gen

      - name: Verificar que auto-generated docs están frescos
        run: git diff --exit-code docs/auto-generated/

      - name: Validar documentación
        run: pnpm docs:check
